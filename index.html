<!DOCTYPE html>
<html>
<head>
  <title>Ultra Translator 100+ Full</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      width: 90%;
      max-width: 520px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    textarea, select, button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
    }

    button {
      background: #3b82f6;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .row button {
      flex: 1;
    }

    #output {
      margin-top: 15px;
      padding: 10px;
      background: #0f172a;
      border-radius: 8px;
      min-height: 40px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Ultra Translator 100+ Full</h2>

  <textarea id="text" placeholder="Text eingeben"></textarea>

  <select id="fromLang"></select>
  <select id="toLang"></select>

  <button onclick="translateText()">Übersetzen</button>

  <div class="row">
    <button onclick="simplifyText()">Vereinfachen</button>
    <button onclick="summarizeText()">Zusammenfassen</button>
  </div>

  <div id="output"></div>
</div>

<script>

let lastResult = "";

/* 🌍 100+ feste Sprachen (stabil & komplett im Code) */
const languages = {
  af:"Afrikaans", sq:"Albanisch", am:"Amharisch", ar:"Arabisch",
  hy:"Armenisch", az:"Aserbaidschanisch", eu:"Baskisch", be:"Belarussisch",
  bn:"Bengalisch", bs:"Bosnisch", bg:"Bulgarisch", ca:"Katalanisch",
  ceb:"Cebuano", ny:"Chichewa", zh:"Chinesisch", co:"Korsisch",
  hr:"Kroatisch", cs:"Tschechisch", da:"Dänisch", nl:"Niederländisch",
  en:"Englisch", eo:"Esperanto", et:"Estnisch", fi:"Finnisch",
  fr:"Französisch", fy:"Friesisch", gl:"Galizisch", ka:"Georgisch",
  de:"Deutsch", el:"Griechisch", gu:"Gujarati", ht:"Haitianisch",
  ha:"Hausa", haw:"Hawaiianisch", he:"Hebräisch", hi:"Hindi",
  hu:"Ungarisch", is:"Isländisch", id:"Indonesisch", ga:"Irisch",
  it:"Italienisch", ja:"Japanisch", jw:"Javanisch", kn:"Kannada",
  kk:"Kasachisch", km:"Khmer", ko:"Koreanisch", ku:"Kurdisch",
  ky:"Kirgisisch", lo:"Laotisch", la:"Latein", lv:"Lettisch",
  lt:"Litauisch", lb:"Luxemburgisch", mk:"Mazedonisch", mg:"Madagassisch",
  ms:"Malaiisch", ml:"Malayalam", mt:"Maltesisch", mi:"Maori",
  mr:"Marathi", mn:"Mongolisch", my:"Burmesisch", ne:"Nepalesisch",
  no:"Norwegisch", ps:"Paschtu", fa:"Persisch", pl:"Polnisch",
  pt:"Portugiesisch", pa:"Punjabi", ro:"Rumänisch", ru:"Russisch",
  sm:"Samoanisch", gd:"Schottisch-Gälisch", sr:"Serbisch", st:"Sesotho",
  sn:"Shona", sd:"Sindhi", si:"Singhalesisch", sk:"Slowakisch",
  sl:"Slowenisch", so:"Somali", es:"Spanisch", su:"Sundanesisch",
  sw:"Swahili", sv:"Schwedisch", tl:"Tagalog", tg:"Tadschikisch",
  ta:"Tamil", te:"Telugu", th:"Thailändisch", tr:"Türkisch",
  uk:"Ukrainisch", ur:"Urdu", uz:"Usbekisch", vi:"Vietnamesisch",
  cy:"Walisisch", xh:"Xhosa", yi:"Jiddisch", yo:"Yoruba", zu:"Zulu"
};

/* 🌍 LOAD */
function loadLanguages(){
  let from = document.getElementById("fromLang");
  let to = document.getElementById("toLang");

  from.innerHTML = "";
  to.innerHTML = "";

  for(let code in languages){
    let o1 = document.createElement("option");
    let o2 = document.createElement("option");

    o1.value = code;
    o1.textContent = languages[code];

    o2.value = code;
    o2.textContent = languages[code];

    from.appendChild(o1);
    to.appendChild(o2);
  }
}

/* 🌍 TRANSLATE */
async function translateText(){
  let text = document.getElementById("text").value;
  let from = document.getElementById("fromLang").value;
  let to = document.getElementById("toLang").value;

  if(!text){
    document.getElementById("output").innerText = "Bitte Text eingeben";
    return;
  }

  try{
    let res = await fetch(
      "https://api.mymemory.translated.net/get?q="
      + encodeURIComponent(text)
      + "&langpair=" + from + "|" + to
    );

    let data = await res.json();

    lastResult = data.responseData.translatedText;

    document.getElementById("output").innerText = lastResult;

  }catch(e){
    document.getElementById("output").innerText =
      "Fehler beim Übersetzen";
  }
}

/* 🧠 VEREINFACHEN (FIXED) */
function simplifyText(){
  let text = lastResult || document.getElementById("text").value;

  if(!text){
    document.getElementById("output").innerText = "Kein Text vorhanden";
    return;
  }

  let result = text
    .replace(/kompliziert|schwierig|durchgeführt|implementiert|Transformation/gi,"gemacht")
    .replace(/Kommunikation/gi,"Austausch")
    .replace(/andererseits|daher|deshalb|somit/gi,"aber")
    .replace(/\s+/g," ")
    .trim();

  document.getElementById("output").innerText =
    "VEREINFACHT:\n\n" + result;
}

/* 🧠 ZUSAMMENFASSEN (FIXED) */
function summarizeText(){
  let text = lastResult || document.getElementById("text").value;

  if(!text){
    document.getElementById("output").innerText = "Kein Text vorhanden";
    return;
  }

  let sentences = text
    .split(".")
    .map(s => s.trim())
    .filter(s => s.length > 10);

  if(sentences.length <= 2){
    document.getElementById("output").innerText =
      "ZUSAMMENFASSUNG:\n\n" + text;
    return;
  }

  let summary = [
    sentences[0],
    sentences[Math.floor(sentences.length / 2)],
    sentences[sentences.length - 1]
  ].join(". ") + ".";

  document.getElementById("output").innerText =
    "ZUSAMMENFASSUNG:\n\n" + summary;
}

window.onload = loadLanguages;

</script>

</body>
</html>
