<!DOCTYPE html>
<html>
<head>
  <title>Ultra Translator 50 Stable</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      width: 90%;
      max-width: 520px;
    }

    textarea, select, button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
    }

    button {
      background: #3b82f6;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .row button {
      flex: 1;
    }

    #output {
      margin-top: 15px;
      padding: 10px;
      background: #0f172a;
      border-radius: 8px;
      min-height: 40px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Ultra Translator 50 Stable</h2>

  <textarea id="text"></textarea>

  <select id="fromLang"></select>
  <select id="toLang"></select>

  <button onclick="translateText()">Übersetzen</button>

  <div class="row">
    <button onclick="simplifyText()">Vereinfachen</button>
    <button onclick="summarizeText()">Zusammenfassen</button>
  </div>

  <div id="output"></div>
</div>

<script>

let lastResult = "";

/* 🌍 50 Sprachen (UNVERÄNDERT BEIBEHALTEN) */
const languages = {
  en:"Englisch", de:"Deutsch", fr:"Französisch", es:"Spanisch",
  it:"Italienisch", pt:"Portugiesisch", ru:"Russisch", zh:"Chinesisch",
  ja:"Japanisch", ko:"Koreanisch", ar:"Arabisch", hi:"Hindi",
  fa:"Persisch", ur:"Urdu", bn:"Bengalisch", tr:"Türkisch",
  vi:"Vietnamesisch", id:"Indonesisch", pl:"Polnisch", uk:"Ukrainisch",
  nl:"Niederländisch", el:"Griechisch", sv:"Schwedisch", da:"Dänisch",
  fi:"Finnisch", no:"Norwegisch", cs:"Tschechisch", ro:"Rumänisch",
  hu:"Ungarisch", he:"Hebräisch", th:"Thailändisch", ms:"Malaiisch",
  tl:"Filipino", sw:"Swahili", ta:"Tamil", te:"Telugu",
  ml:"Malayalam", kn:"Kannada", pa:"Punjabi", mr:"Marathi",
  ne:"Nepalesisch", si:"Singhalesisch", my:"Burmesisch", km:"Khmer",
  lo:"Laotisch", am:"Amharisch", az:"Aserbaidschanisch", so:"Somali",
  zu:"Zulu", yo:"Yoruba"
};

/* LOAD (robust) */
function loadLanguages(){
  const from = document.getElementById("fromLang");
  const to = document.getElementById("toLang");

  if(!from || !to) return;

  from.innerHTML = "";
  to.innerHTML = "";

  Object.keys(languages).forEach(code => {
    from.add(new Option(languages[code], code));
    to.add(new Option(languages[code], code));
  });
}

/* TRANSLATE (FIX: fallback + safer API handling) */
async function translateText(){
  let text = document.getElementById("text").value;
  let from = document.getElementById("fromLang").value;
  let to = document.getElementById("toLang").value;

  if(!text){
    document.getElementById("output").innerText = "Bitte Text eingeben";
    return;
  }

  try{
    let url =
      "https://api.mymemory.translated.net/get?q="
      + encodeURIComponent(text)
      + "&langpair=" + from + "|" + to;

    let res = await fetch(url);

    if(!res.ok){
      throw new Error("Network error");
    }

    let data = await res.json();

    lastResult =
      (data && data.responseData && data.responseData.translatedText)
      ? data.responseData.translatedText
      : text;

    document.getElementById("output").innerText = lastResult;

  }catch(e){
    document.getElementById("output").innerText =
      "Übersetzung nicht verfügbar (API Problem)";
  }
}

/* VEREINFACHEN (leicht, stabil) */
function simplifyText(){
  let text = lastResult || document.getElementById("text").value;

  if(!text){
    document.getElementById("output").innerText = "Kein Text vorhanden";
    return;
  }

  let result = text
    .replace(/sehr|wirklich|ziemlich|eigentlich|relativ/gi,"")
    .replace(/\s+/g," ")
    .trim();

  document.getElementById("output").innerText =
    "VEREINFACHT:\n\n" + result;
}

/* ZUSAMMENFASSEN (stabil) */
function summarizeText(){
  let text = lastResult || document.getElementById("text").value;

  if(!text){
    document.getElementById("output").innerText = "Kein Text vorhanden";
    return;
  }

  let sentences = text.split(".").map(s => s.trim()).filter(Boolean);

  let keep = Math.max(1, Math.ceil(sentences.length * 0.3));

  document.getElementById("output").innerText =
    "ZUSAMMENFASSUNG:\n\n" +
    sentences.slice(0, keep).join(". ") + ".";
}

/* INIT SAFE */
document.addEventListener("DOMContentLoaded", loadLanguages);

</script>

</body>
</html>
