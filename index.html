<!DOCTYPE html>
<html>
<head>
  <title>Ultra Translator 50 Stable</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      width: 90%;
      max-width: 520px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    textarea, select, button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
    }

    button {
      background: #3b82f6;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .row button {
      flex: 1;
    }

    #output {
      margin-top: 15px;
      padding: 10px;
      background: #0f172a;
      border-radius: 8px;
      min-height: 40px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Ultra Translator 50 Stable</h2>

  <textarea id="text" placeholder="Text eingeben"></textarea>

  <select id="fromLang"></select>
  <select id="toLang"></select>

  <button onclick="translateText()">Übersetzen</button>

  <div class="row">
    <button onclick="simplifyText()">Vereinfachen</button>
    <button onclick="summarizeText()">Zusammenfassen</button>
  </div>

  <div id="output"></div>
</div>

<script>

let lastResult = "";

/* 🌍 FIX: exakt 50 Sprachen (behalten wie gewünscht) */
const languages = {
  en:"Englisch",
  de:"Deutsch",
  fr:"Französisch",
  es:"Spanisch",
  it:"Italienisch",
  pt:"Portugiesisch",
  ru:"Russisch",
  zh:"Chinesisch",
  ja:"Japanisch",
  ko:"Koreanisch",
  ar:"Arabisch",
  hi:"Hindi",
  fa:"Persisch",
  ur:"Urdu",
  bn:"Bengalisch",
  tr:"Türkisch",
  vi:"Vietnamesisch",
  id:"Indonesisch",
  pl:"Polnisch",
  uk:"Ukrainisch",
  nl:"Niederländisch",
  el:"Griechisch",
  sv:"Schwedisch",
  da:"Dänisch",
  fi:"Finnisch",
  no:"Norwegisch",
  cs:"Tschechisch",
  ro:"Rumänisch",
  hu:"Ungarisch",
  he:"Hebräisch",
  th:"Thailändisch",
  ms:"Malaiisch",
  tl:"Filipino",
  sw:"Swahili",
  ta:"Tamil",
  te:"Telugu",
  ml:"Malayalam",
  kn:"Kannada",
  pa:"Punjabi",
  mr:"Marathi",
  ne:"Nepalesisch",
  si:"Singhalesisch",
  my:"Burmesisch",
  km:"Khmer",
  lo:"Laotisch",
  am:"Amharisch",
  az:"Aserbaidschanisch",
  so:"Somali",
  zu:"Zulu",
  yo:"Yoruba"
};

/* 🌍 LOAD */
function loadLanguages(){
  const from = document.getElementById("fromLang");
  const to = document.getElementById("toLang");

  from.innerHTML = "";
  to.innerHTML = "";

  for(let code in languages){
    let o1 = document.createElement("option");
    let o2 = document.createElement("option");

    o1.value = code;
    o1.textContent = languages[code];

    o2.value = code;
    o2.textContent = languages[code];

    from.appendChild(o1);
    to.appendChild(o2);
  }
}

/* 🌍 TRANSLATE (stabil + Fehlercheck) */
async function translateText(){
  let text = document.getElementById("text").value;
  let from = document.getElementById("fromLang").value;
  let to = document.getElementById("toLang").value;

  if(!text){
    document.getElementById("output").innerText = "Bitte Text eingeben";
    return;
  }

  try{
    let url =
      "https://api.mymemory.translated.net/get?q="
      + encodeURIComponent(text)
      + "&langpair=" + from + "|" + to;

    let res = await fetch(url);
    let data = await res.json();

    lastResult = data?.responseData?.translatedText || "";

    document.getElementById("output").innerText =
      lastResult || "Keine Übersetzung erhalten";

  }catch(e){
    document.getElementById("output").innerText =
      "Fehler beim Übersetzen";
  }
}

/* 🧠 VEREINFACHEN (sichtbar stärker wie vorher gewünscht) */
function simplifyText(){
  let text = lastResult || document.getElementById("text").value;

  if(!text){
    document.getElementById("output").innerText = "Kein Text vorhanden";
    return;
  }

  let sentences = text.split(".").map(s => s.trim()).filter(Boolean);

  let simplified = sentences.map(s =>
    s
      .replace(/sehr|wirklich|ziemlich|eigentlich|relativ|komplex/gi,"")
      .replace(/durchgeführt|implementiert|ausgeführt|realisiert/gi,"gemacht")
      .replace(/Kommunikation|Interaktion|Korrespondenz/gi,"Austausch")
      .replace(/Informationen?|Details|Daten/gi,"Infos")
      .replace(/\s+/g," ")
      .trim()
  );

  // 🔥 bewusst stärker kürzen (sichtbarer Effekt)
  simplified = simplified
    .filter(s => s.length > 12)
    .slice(0, Math.max(1, Math.ceil(simplified.length * 0.55)));

  document.getElementById("output").innerText =
    "VEREINFACHT:\n\n" + simplified.join(". ");
}

/* 🧠 ZUSAMMENFASSEN (deutlich kürzer & sichtbar anders) */
function summarizeText(){
  let text = lastResult || document.getElementById("text").value;

  if(!text){
    document.getElementById("output").innerText = "Kein Text vorhanden";
    return;
  }

  let sentences = text
    .split(".")
    .map(s => s.trim())
    .filter(s => s.length > 8);

  if(sentences.length <= 2){
    document.getElementById("output").innerText =
      "ZUSAMMENFASSUNG:\n\n" + text;
    return;
  }

  // 🔥 nur 20–25% behalten = deutlicher Unterschied
  let keep = Math.max(1, Math.ceil(sentences.length * 0.22));

  let summary = sentences.slice(0, keep).join(". ");

  document.getElementById("output").innerText =
    "ZUSAMMENFASSUNG:\n\n" + summary + ".";
}

/* 🔥 safe init */
document.addEventListener("DOMContentLoaded", loadLanguages);

</script>

</body>
</html>
