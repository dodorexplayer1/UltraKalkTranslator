<!DOCTYPE html>
<html>
<head>
  <title>Ultra Translator Pro V2</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    textarea, select, input, button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
    }

    button {
      background: #3b82f6;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    #output {
      margin-top: 15px;
      padding: 10px;
      background: #0f172a;
      border-radius: 8px;
      min-height: 40px;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Ultra Translator Pro V2</h2>

  <textarea id="text" placeholder="Text eingeben"></textarea>

  <input id="search" placeholder="Sprache suchen..." onkeyup="filterLanguages()">

  <select id="lang"></select>

  <button onclick="translateText()">Übersetzen</button>

  <div id="output"></div>
</div>

<script>
let allLanguages = {};

async function loadLanguages() {
  try {
    let res = await fetch("https://libretranslate.de/languages");
    let data = await res.json();

    allLanguages = data;

    renderLanguages(data);
  } catch (e) {
    document.getElementById("output").innerText =
      "Fehler: Sprachen konnten nicht geladen werden";
  }
}

function renderLanguages(list) {
  let select = document.getElementById("lang");
  select.innerHTML = "";

  list.forEach(lang => {
    let option = document.createElement("option");
    option.value = lang.code;
    option.textContent = lang.name;
    select.appendChild(option);
  });
}

function filterLanguages() {
  let input = document.getElementById("search").value.toLowerCase();

  let filtered = allLanguages.filter(lang =>
    lang.name.toLowerCase().includes(input)
  );

  renderLanguages(filtered);
}

async function translateText() {
  let text = document.getElementById("text").value;
  let lang = document.getElementById("lang").value;

  if (!text) {
    document.getElementById("output").innerText = "Bitte Text eingeben";
    return;
  }

  try {
    let response = await fetch("https://libretranslate.de/translate", {
      method: "POST",
      body: JSON.stringify({
        q: text,
        source: "de",
        target: lang,
        format: "text"
      }),
      headers: { "Content-Type": "application/json" }
    });

    let data = await response.json();

    document.getElementById("output").innerText =
      data.translatedText;

  } catch (e) {
    document.getElementById("output").innerText =
      "Fehler beim Übersetzen";
  }
}

window.onload = loadLanguages;
</script>

</body>
</html>
