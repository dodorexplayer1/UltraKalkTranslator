<!DOCTYPE html>
<html>
<head>
  <title>Ultra Translator AI Pro</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      width: 90%;
      max-width: 520px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    textarea, select, button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
    }

    button {
      background: #3b82f6;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .row button {
      flex: 1;
    }

    #output {
      margin-top: 15px;
      padding: 10px;
      background: #0f172a;
      border-radius: 8px;
      min-height: 40px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Ultra Translator AI Pro</h2>

  <textarea id="text" placeholder="Text eingeben"></textarea>

  <select id="fromLang"></select>
  <select id="toLang"></select>

  <button onclick="translateText()">Übersetzen</button>

  <div class="row">
    <button onclick="simplifyText()">Vereinfachen</button>
    <button onclick="summarizeText()">Zusammenfassen</button>
  </div>

  <div id="output"></div>
</div>

<script>

let lastResult = "";

// 🌍 FIXE 100+ SPRACHLISTE (KEINE API MEHR)
const languages = {
  af:"Afrikaans", sq:"Albanisch", am:"Amharisch", ar:"Arabisch",
  hy:"Armenisch", az:"Aserbaidschanisch", eu:"Baskisch", be:"Belarussisch",
  bn:"Bengalisch", bs:"Bosnisch", bg:"Bulgarisch", ca:"Katalanisch",
  ceb:"Cebuano", zh:"Chinesisch", hr:"Kroatisch", cs:"Tschechisch",
  da:"Dänisch", nl:"Niederländisch", en:"Englisch", eo:"Esperanto",
  et:"Estnisch", fi:"Finnisch", fr:"Französisch", fy:"Friesisch",
  gl:"Galizisch", ka:"Georgisch", de:"Deutsch", el:"Griechisch",
  gu:"Gujarati", ht:"Haitianisch", ha:"Hausa", he:"Hebräisch",
  hi:"Hindi", hu:"Ungarisch", is:"Isländisch", id:"Indonesisch",
  it:"Italienisch", ja:"Japanisch", ko:"Koreanisch", lv:"Lettisch",
  lt:"Litauisch", no:"Norwegisch", pl:"Polnisch", pt:"Portugiesisch",
  ro:"Rumänisch", ru:"Russisch", sk:"Slowakisch", sl:"Slowenisch",
  es:"Spanisch", sv:"Schwedisch", th:"Thailändisch", tr:"Türkisch",
  uk:"Ukrainisch", vi:"Vietnamesisch", fa:"Persisch", ur:"Urdu",
  ta:"Tamil", te:"Telugu", ml:"Malayalam", kn:"Kannada",
  pa:"Punjabi", mr:"Marathi", ne:"Nepalesisch", si:"Singhalesisch",
  my:"Burmesisch", km:"Khmer", lo:"Laotisch", mn:"Mongolisch",
  sw:"Swahili", zu:"Zulu", xh:"Xhosa", yo:"Yoruba"
};

// 🟢 Sprache laden (lokal, stabil)
function loadLanguages(){
  let from = document.getElementById("fromLang");
  let to = document.getElementById("toLang");

  for(let code in languages){
    let o1 = document.createElement("option");
    let o2 = document.createElement("option");

    o1.value = code;
    o1.textContent = languages[code];

    o2.value = code;
    o2.textContent = languages[code];

    from.appendChild(o1);
    to.appendChild(o2);
  }
}

// 🌍 Übersetzen (jede Sprache → jede Sprache)
async function translateText(){
  let text = document.getElementById("text").value;
  let from = document.getElementById("fromLang").value;
  let to = document.getElementById("toLang").value;

  if(!text){
    document.getElementById("output").innerText = "Bitte Text eingeben";
    return;
  }

  try{
    let res = await fetch(
      "https://api.mymemory.translated.net/get?q="
      + encodeURIComponent(text)
      + "&langpair=" + from + "|" + to
    );

    let data = await res.json();

    lastResult = data.responseData.translatedText;

    document.getElementById("output").innerText = lastResult;

  }catch(e){
    document.getElementById("output").innerText =
      "Fehler beim Übersetzen";
  }
}

// 🧠 Vereinfachen
function simplifyText(){
  let text = lastResult || document.getElementById("text").value;

  document.getElementById("output").innerText =
    text
    .replace(/kompliziert|schwierig/gi, "einfach")
    .replace(/Kommunikation/gi, "Austausch")
    .replace(/Transformation/gi, "Veränderung");
}

// 🧠 Zusammenfassen
function summarizeText(){
  let text = lastResult || document.getElementById("text").value;

  let sentences = text.split(".").filter(s => s.trim().length > 10);

  let summary = sentences.slice(0, 2).join(". ") + ".";

  document.getElementById("output").innerText = summary;
}

window.onload = loadLanguages;

</script>

</body>
</html>
