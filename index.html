<!DOCTYPE html>
<html>
<head>
  <title>Ultra Translator 50 Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    #loginScreen{
      position:fixed;
      inset:0;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#0f172a,#1e293b);
    }

    .box{
      background:#111827;
      padding:20px;
      border-radius:12px;
      width:300px;
    }

    input,button{
      width:100%;
      padding:10px;
      margin-top:10px;
      border-radius:8px;
      border:none;
    }

    button{
      background:#3b82f6;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    #app{display:none;padding:20px;}

    textarea,select{
      width:100%;
      margin-top:10px;
      padding:10px;
      border-radius:8px;
      border:none;
    }

    textarea{
      min-height:90px;
      background:#111827;
      color:white;
    }

    select{
      background:#111827;
      color:white;
    }

    #output{
      margin-top:10px;
      padding:10px;
      background:#111827;
      border-radius:8px;
      min-height:60px;
    }

    .row{display:flex;gap:10px;}
    .row button{flex:1;}

    /* CHAT FIX */
    #chatBox{
      position:fixed;
      bottom:140px;
      right:10px;
      width:250px;
      max-height:250px;
      overflow-y:auto;
      overflow-x:hidden;
      background:#111827;
      padding:10px;
      border-radius:10px;
      display:none;
      scroll-behavior:smooth;
    }

    #chatInputBox{
      position:fixed;
      bottom:70px;
      right:10px;
      width:250px;
      background:#111827;
      padding:10px;
      border-radius:10px;
      display:none;
    }

    #chatInput{
      width:100%;
      padding:8px;
      border-radius:8px;
      border:none;
      background:#0f172a;
      color:white;
    }

    #chatToggle{
      position:fixed;
      bottom:10px;
      right:10px;
      width:55px;
      height:55px;
      border-radius:50%;
      background:#3b82f6;
      display:flex;
      justify-content:center;
      align-items:center;
      cursor:pointer;
      font-size:22px;
    }

    /* MENU */
    #menuBtn{
      position:fixed;
      top:10px;
      right:10px;
      font-size:24px;
      cursor:pointer;
    }

    #menu{
      position:fixed;
      top:40px;
      right:10px;
      background:#111827;
      padding:10px;
      border-radius:10px;
      display:none;
      width:220px;
    }

    #menuInfo{
      font-size:12px;
      opacity:0.85;
      margin-bottom:10px;
      white-space:pre-line;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="box">

    <h3>Login</h3>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Passwort">
    <input id="username" placeholder="Username">

    <button onclick="login()">Login</button>
    <button onclick="register()">Registrieren</button>

    <hr>

    <input id="guestName" placeholder="Gast Username">
    <button onclick="guestLogin()">Als Gast</button>

  </div>
</div>

<!-- APP -->
<div id="app">

  <div id="menuBtn" onclick="toggleMenu()">|||</div>

  <div id="menu">
    <div id="menuInfo"></div>

    <button onclick="openSettings()">Settings</button>
    <button onclick="openHelp()">Help & Support</button>
    <button onclick="showFacts()">Facts</button>

    <hr>
    <button onclick="logout()">Logout</button>
  </div>

  <h2>Ultra Translator 50 Global</h2>

  <textarea id="text"></textarea>

  <select id="fromLang"></select>
  <select id="toLang"></select>

  <button onclick="translateText()">Übersetzen</button>

  <div class="row">
    <button onclick="simplifyText()">Vereinfachen</button>
    <button onclick="summarizeText()">Zusammenfassen</button>
  </div>

  <div id="output"></div>
</div>

<!-- CHAT -->
<div id="chatBox"></div>

<div id="chatInputBox">
  <input id="chatInput" placeholder="Nachricht...">
  <button onclick="sendChat()">Senden</button>
</div>

<div id="chatToggle" onclick="toggleChat()">💬</div>

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyAjS5W-l2Hm_iBSq4_az2WReQwY4ZmEweU",
  authDomain: "projekt-erstellen-dfc13.firebaseapp.com",
  projectId: "projekt-erstellen-dfc13",
  storageBucket: "projekt-erstellen-dfc13.firebasestorage.app",
  messagingSenderId: "1040865035180",
  appId: "1:1040865035180:web:273c7c1998d9b57664f009"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const chatRef = db.collection("chat");

let isGuest=false;
let guestUser="";
let currentUsername="";
let messageCount=0;
let chatOpen=false;

let lastTranslatedText="";
let recentTranslations=[];

/* AUTH */
function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
    .then(()=>currentUsername=username.value);
}

function register(){
  auth.createUserWithEmailAndPassword(email.value,password.value)
    .then(()=>currentUsername=username.value);
}

function logout(){
  isGuest=false;
  guestUser="";
  currentUsername="";
  auth.signOut();
}

/* GUEST */
function guestLogin(){
  if(!guestName.value.trim()) return;

  isGuest=true;
  guestUser=guestName.value;

  loginScreen.style.display="none";
  app.style.display="block";

  loadChat();
}

/* STATE */
auth.onAuthStateChanged(user=>{
  if(user || isGuest){
    loginScreen.style.display="none";
    app.style.display="block";
    loadChat();
  }else{
    loginScreen.style.display="flex";
    app.style.display="none";
  }
});

/* MENU */
function toggleMenu(){
  const m=document.getElementById("menu");
  m.style.display=m.style.display==="none"?"block":"none";
}

/* CHAT TOGGLE */
function toggleChat(){
  chatOpen=!chatOpen;
  chatBox.style.display=chatOpen?"block":"none";
  chatInputBox.style.display=chatOpen?"block":"none";
}

/* CHAT FIX FINAL */
function loadChat(){
  chatRef.orderBy("time","asc").onSnapshot(snap=>{
    const box=document.getElementById("chatBox");
    if(!box) return;

    const wasAtBottom =
      box.scrollTop + box.clientHeight >= box.scrollHeight - 20;

    box.innerHTML="";
    messageCount=0;

    snap.forEach(d=>{
      const data=d.data();
      messageCount++;

      const div=document.createElement("div");
      div.style.padding="4px";
      div.innerText=data.user+": "+data.text;
      box.appendChild(div);
    });

    updateMenuInfo();

    // 🔥 SMART AUTO SCROLL
    if(wasAtBottom){
      requestAnimationFrame(()=>{
        box.scrollTop = box.scrollHeight;
      });
    }
  });
}

/* MENU INFO */
function updateMenuInfo(){
  const info=document.getElementById("menuInfo");

  const now=new Date();
  const reset=new Date();
  reset.setHours(24,0,0,0);

  const diff=reset-now;
  const h=Math.floor(diff/1000/60/60);
  const m=Math.floor((diff/1000/60)%60);

  let recent="";
  if(recentTranslations.length>0){
    const last=recentTranslations[0];
    recent=`\n🔁 ${last.from}→${last.to}`;
  }

  info.innerText=
`⏱ Reset: ${h}h ${m}m
💬 Messages: ${messageCount}`+recent;
}

setInterval(updateMenuInfo,60000);

/* SEND */
function sendChat(){
  const msg=chatInput.value;
  if(!msg.trim()) return;

  const user=isGuest?guestUser:(currentUsername||auth.currentUser?.email);

  chatRef.add({
    text:msg,
    user:user,
    time:Date.now()
  });

  chatInput.value="";

  // 🔥 sofort runter scrollen
  const box=document.getElementById("chatBox");
  requestAnimationFrame(()=>{
    box.scrollTop = box.scrollHeight;
  });
}

/* TRANSLATE */
async function translateText(){
  const text=document.getElementById("text").value;
  const from=document.getElementById("fromLang").value;
  const to=document.getElementById("toLang").value;

  const res=await fetch(
    "https://api.mymemory.translated.net/get?q="+
    encodeURIComponent(text)+
    "&langpair="+from+"|"+to
  );

  const data=await res.json();

  lastTranslatedText=data.responseData.translatedText;

  recentTranslations.unshift({from,to});
  if(recentTranslations.length>5) recentTranslations.pop();

  document.getElementById("output").innerText=lastTranslatedText;
}

/* FIX FUNCTIONS */
function simplifyText(){
  const base=lastTranslatedText||text.value;
  output.innerText="VEREINFACHT:\n\n"+base.split(".")[0];
}

function summarizeText(){
  const base=lastTranslatedText||text.value;
  output.innerText="ZUSAMMENFASSUNG:\n\n"+base.split(" ").slice(0,25).join(" ")+"...";
}

/* MENU FEATURES */
function openSettings(){
  output.innerText="⚙ Settings Menü";
}

function openHelp(){
  output.innerText="🆘 Help & Support";
}

function showFacts(){
  const f=["Firebase Chat","Translation API","Realtime System"];
  output.innerText="📊 "+f[Math.floor(Math.random()*f.length)];
}

/* LANGUAGES */
const languages={en:"Englisch",de:"Deutsch",fr:"Französisch",es:"Spanisch",it:"Italienisch",pt:"Portugiesisch"};

function loadLanguages(){
  const f=document.getElementById("fromLang");
  const t=document.getElementById("toLang");

  for(let c in languages){
    f.add(new Option(languages[c],c));
    t.add(new Option(languages[c],c));
  }
}

document.addEventListener("DOMContentLoaded",loadLanguages);

</script>

</body>
</html>
