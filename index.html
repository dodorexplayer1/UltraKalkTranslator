<!DOCTYPE html>
<html>
<head>
  <title>Ultra Translator 50 Global</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:linear-gradient(135deg,#0f172a,#1e293b);
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }

    .card{
      background:#111827;
      padding:22px;
      border-radius:18px;
      width:92%;
      max-width:540px;
      position:relative;
      box-shadow:0 10px 30px rgba(0,0,0,0.4);
    }

    h2{
      margin-top:5px;
      text-align:center;
      font-size:20px;
    }

    textarea,select,button{
      width:100%;
      margin-top:10px;
      padding:12px;
      border-radius:10px;
      border:none;
      font-size:14px;
    }

    textarea{
      min-height:90px;
      resize:none;
      background:#0f172a;
      color:white;
    }

    select{
      background:#0f172a;
      color:white;
    }

    button{
      background:#3b82f6;
      color:white;
      font-weight:bold;
      cursor:pointer;
      transition:0.2s;
    }

    button:hover{
      background:#2563eb;
      transform:scale(1.02);
    }

    .row{display:flex;gap:10px;}
    .row button{flex:1;}

    #output{
      margin-top:15px;
      padding:12px;
      background:#0f172a;
      border-radius:10px;
      min-height:70px;
      white-space:pre-wrap;
      border:1px solid #1f2937;
    }

    .menu-icon{
      position:absolute;
      top:12px;
      right:14px;
      cursor:pointer;
      font-size:18px;
    }

    .menu{
      position:absolute;
      top:45px;
      right:10px;
      background:#0f172a;
      border-radius:12px;
      width:180px;
      overflow:hidden;
      border:1px solid #1f2937;
    }

    .menu div{
      padding:10px;
      cursor:pointer;
      border-bottom:1px solid #1f2937;
    }

    .menu div:hover{
      background:#1e293b;
    }

    .hidden{display:none;}

    #chatBox{
      position:fixed;
      bottom:10px;
      right:10px;
      width:260px;
      background:#0f172a;
      padding:10px;
      border-radius:12px;
      font-size:12px;
      border:1px solid #1f2937;
    }

    #chatMessages{
      height:140px;
      overflow-y:auto;
      background:#111827;
      padding:6px;
      border-radius:8px;
      margin-bottom:6px;
    }

    #chatInput{
      width:100%;
      padding:8px;
      border-radius:8px;
      border:none;
      margin-top:5px;
      background:#0f172a;
      color:white;
    }
  </style>
</head>

<body>

<div class="card">

  <div class="menu-icon" onclick="toggleMenu()">|||</div>

  <div id="menu" class="menu hidden">
    <div onclick="openSettings()">Settings</div>
    <div onclick="openLogin()">Login</div>
    <div onclick="openSupport()">Help & Support</div>
    <div onclick="openRules()">Regeln</div>
  </div>

  <h2>Ultra Translator 50 Global</h2>

  <textarea id="text"></textarea>

  <select id="fromLang"></select>
  <select id="toLang"></select>

  <button onclick="translateText()">Übersetzen</button>

  <div class="row">
    <button onclick="simplifyText()">Vereinfachen</button>
    <button onclick="summarizeText()">Zusammenfassen</button>
  </div>

  <div id="output"></div>
</div>

<div id="chatBox">
  <b>💬 Tipps</b>
  <div id="chatMessages"></div>
  <input id="chatInput" placeholder="Tipp schreiben">
  <button onclick="sendChat()">Senden</button>
</div>

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyAjS5W-l2Hm_iBSq4_az2WReQwY4ZmEweU",
  authDomain: "projekt-erstellen-dfc13.firebaseapp.com",
  projectId: "projekt-erstellen-dfc13",
  storageBucket: "projekt-erstellen-dfc13.firebasestorage.app",
  messagingSenderId: "1040865035180",
  appId: "1:1040865035180:web:273c7c1998d9b57664f009"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const chatRef = db.collection("chat");

let lastResult = "";

/* 🌍 50 Sprachen */
const languages = {
  en:"Englisch", de:"Deutsch", fr:"Französisch", es:"Spanisch",
  it:"Italienisch", pt:"Portugiesisch", ru:"Russisch", zh:"Chinesisch",
  ja:"Japanisch", ko:"Koreanisch", ar:"Arabisch", hi:"Hindi",
  fa:"Persisch", ur:"Urdu", bn:"Bengalisch", tr:"Türkisch",
  vi:"Vietnamesisch", id:"Indonesisch", pl:"Polnisch", uk:"Ukrainisch",
  nl:"Niederländisch", el:"Griechisch", sv:"Schwedisch", da:"Dänisch",
  fi:"Finnisch", no:"Norwegisch", cs:"Tschechisch", ro:"Rumänisch",
  hu:"Ungarisch", he:"Hebräisch", th:"Thailändisch", ms:"Malaiisch",
  tl:"Filipino", sw:"Swahili", ta:"Tamil", te:"Telugu",
  ml:"Malayalam", kn:"Kannada", pa:"Punjabi", mr:"Marathi",
  ne:"Nepalesisch", si:"Singhalesisch", my:"Burmesisch", km:"Khmer",
  lo:"Laotisch", am:"Amharisch", az:"Aserbaidschanisch", so:"Somali",
  zu:"Zulu", yo:"Yoruba"
};

function loadLanguages(){
  let f=document.getElementById("fromLang");
  let t=document.getElementById("toLang");

  for(let c in languages){
    f.add(new Option(languages[c],c));
    t.add(new Option(languages[c],c));
  }
}

/* TRANSLATE */
async function translateText(){
  let text=document.getElementById("text").value;
  let from=document.getElementById("fromLang").value;
  let to=document.getElementById("toLang").value;

  let res=await fetch(
    "https://api.mymemory.translated.net/get?q="+
    encodeURIComponent(text)+
    "&langpair="+from+"|"+to
  );

  let data=await res.json();
  lastResult = data.responseData.translatedText;
  document.getElementById("output").innerText = lastResult;
}

/* VEREINFACHEN */
function simplifyText(){
  let text = lastResult || document.getElementById("text").value || "";

  if(!text.trim()){
    document.getElementById("output").innerText = "Kein Text zum Vereinfachen";
    return;
  }

  let sentences = text.split(/[.!?]/).map(s=>s.trim()).filter(Boolean);
  let keep = Math.max(1, Math.ceil(sentences.length * 0.5));

  let result = sentences.slice(0,keep).map(s=>{
    let simple = s
      .replace(/\b(jedoch|allerdings|dennoch|trotzdem)\b/gi,"aber")
      .replace(/\b(durchgeführt|implementiert|realisiert|ausgeführt)\b/gi,"gemacht")
      .replace(/\b(Informationen?|Details|Aspekte|Daten)\b/gi,"Infos")
      .replace(/\b(komplex|kompliziert|schwierig)\b/gi,"einfach");

    return simple.length > 80 ? simple.slice(0,70)+"..." : simple;
  }).join(". ");

  document.getElementById("output").innerText =
    "VEREINFACHT:\n\n" + result + ".";
}

/* ZUSAMMENFASSEN */
function summarizeText(){
  let text = lastResult || document.getElementById("text").value || "";

  let sentences = text.split(/[.!?]/).map(s=>s.trim()).filter(s=>s.length>20);
  if(sentences.length===0){
    document.getElementById("output").innerText=text;
    return;
  }

  let first = sentences[0];
  let longest = sentences.sort((a,b)=>b.length-a.length)[0];

  let summary = first;
  if(longest!==first) summary += ". "+longest;

  document.getElementById("output").innerText =
    "ZUSAMMENFASSUNG:\n\n"+summary+".";
}

/* MENU */
function toggleMenu(){
  document.getElementById("menu").classList.toggle("hidden");
}
function openSettings(){output.innerText="Settings";}
function openLogin(){output.innerText="Login";}
function openSupport(){output.innerText="Support";}
function openRules(){output.innerText="Regeln";}

/* CHAT */
function sendChat(){
  let msg=document.getElementById("chatInput").value;
  if(!msg) return;

  chatRef.add({text:msg,time:Date.now()});
  document.getElementById("chatInput").value="";
}

function loadChat(){
  chatRef.orderBy("time").onSnapshot(snap=>{
    let box=document.getElementById("chatMessages");
    box.innerHTML="";
    snap.forEach(d=>{
      let div=document.createElement("div");
      div.innerText="💡 "+d.data().text;
      box.appendChild(div);
    });
  });
}

/* INIT */
document.addEventListener("DOMContentLoaded",()=>{
  loadLanguages();
  loadChat();
});

</script>

</body>
</html>
