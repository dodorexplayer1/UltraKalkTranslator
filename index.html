<!DOCTYPE html>
<html>
<head>
  <title>Ultra Translator</title>
</head>
<body>

<h1>Ultra Online Translator</h1>

<textarea id="text" placeholder="Text eingeben"></textarea>

<select id="lang">
  <option value="en">Englisch</option>
  <option value="es">Spanisch</option>
  <option value="fr">Französisch</option>
  <option value="it">Italienisch</option>
</select>

<button onclick="translateText()">Übersetzen</button>

<p id="output"></p>

<script>
async function translateText() {
  let text = document.getElementById("text").value;
  let lang = document.getElementById("lang").value;

  if (!text) {
    document.getElementById("output").innerText = "Bitte Text eingeben";
    return;
  }

  let url = "https://api.mymemory.translated.net/get?q="
    + encodeURIComponent(text)
    + "&langpair=de|" + lang;

  try {
    let response = await fetch(url);
    let data = await response.json();

    document.getElementById("output").innerText =
      data.responseData.translatedText;
  } catch (e) {
    document.getElementById("output").innerText =
      "Fehler: Übersetzung nicht möglich";
  }
}
</script>

</body>
</html>
