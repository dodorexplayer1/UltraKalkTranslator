<!DOCTYPE html>
<html>
<head>
  <title>Ultra Translator 50 Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    #loginScreen{
      position:fixed;
      inset:0;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#0f172a,#1e293b);
    }

    .box{
      background:#111827;
      padding:20px;
      border-radius:12px;
      width:300px;
    }

    input,button{
      width:100%;
      padding:10px;
      margin-top:10px;
      border-radius:8px;
      border:none;
    }

    button{
      background:#3b82f6;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    #app{display:none;padding:20px;}

    textarea,select{
      width:100%;
      margin-top:10px;
      padding:10px;
      border-radius:8px;
      border:none;
    }

    textarea{
      min-height:90px;
      background:#111827;
      color:white;
    }

    select{
      background:#111827;
      color:white;
    }

    #output{
      margin-top:10px;
      padding:10px;
      background:#111827;
      border-radius:8px;
      min-height:60px;
      white-space:pre-line;
    }

    .row{display:flex;gap:10px;}
    .row button{flex:1;}

    /* CHAT FIX */
    #chatBox{
      position:fixed;
      bottom:140px;
      right:10px;
      width:260px;
      height:260px;
      overflow-y:auto;
      background:#111827;
      padding:10px;
      border-radius:10px;
      display:none;
      scroll-behavior:smooth;
    }

    #chatInputBox{
      position:fixed;
      bottom:70px;
      right:10px;
      width:260px;
      background:#111827;
      padding:10px;
      border-radius:10px;
      display:none;
    }

    #chatToggle{
      position:fixed;
      bottom:10px;
      right:10px;
      width:55px;
      height:55px;
      border-radius:50%;
      background:#3b82f6;
      display:flex;
      justify-content:center;
      align-items:center;
      cursor:pointer;
    }

    /* MENU */
    #menuBtn{
      position:fixed;
      top:10px;
      right:10px;
      font-size:24px;
      cursor:pointer;
    }

    #menu{
      position:fixed;
      top:40px;
      right:10px;
      background:#111827;
      padding:10px;
      border-radius:10px;
      display:none;
      width:240px;
    }

    #menuInfo{
      font-size:12px;
      opacity:0.85;
      white-space:pre-line;
    }

    /* IMAGE */
    #uploadTop{
      position:fixed;
      top:10px;
      left:50%;
      transform:translateX(-50%);
      z-index:999;
    }

    #imagePanel{
      display:none;
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      width:320px;
      background:#111827;
      padding:10px;
      border-radius:10px;
      z-index:999;
      max-height:70vh;
      overflow-y:auto;
    }

    #gallery img{
      width:100%;
      margin-top:10px;
      border-radius:8px;
    }
  </style>
</head>

<body>

<div id="loginScreen">
  <div class="box">
    <h3>Login</h3>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Passwort">
    <input id="username" placeholder="Username">

    <button onclick="login()">Login</button>
    <button onclick="register()">Registrieren</button>

    <hr>

    <input id="guestName" placeholder="Gast Username">
    <button onclick="guestLogin()">Als Gast</button>
  </div>
</div>

<div id="app">

  <div id="menuBtn" onclick="toggleMenu()">|||</div>

  <div id="menu">
    <div id="menuInfo"></div>
  </div>

  <!-- IMAGE BUTTON FIXED TOP CENTER -->
  <div id="uploadTop">
    <button onclick="openImage()">+ Upload Image</button>
  </div>

  <h2>Ultra Translator 50 Global</h2>

  <textarea id="text"></textarea>

  <select id="fromLang"></select>
  <select id="toLang"></select>

  <button onclick="translateText()">Übersetzen</button>

  <div class="row">
    <button onclick="simplifyText()">Vereinfachen</button>
    <button onclick="summarizeText()">Zusammenfassen</button>
  </div>

  <div id="output"></div>
</div>

<!-- CHAT -->
<div id="chatBox"></div>

<div id="chatInputBox">
  <input id="chatInput" placeholder="Nachricht...">
  <button onclick="sendChat()">Senden</button>
</div>

<div id="chatToggle" onclick="toggleChat()">💬</div>

<!-- IMAGE PANEL -->
<div id="imagePanel">
  <input type="file" id="imgUpload">
  <button onclick="uploadImage()">Upload</button>
  <div id="gallery"></div>
</div>

<script>

/* FIREBASE */
firebase.initializeApp({
  apiKey:"AIzaSyAjS5W-l2Hm_iBSq4_az2WReQwY4ZmEweU",
  authDomain:"projekt-erstellen-dfc13.firebaseapp.com",
  projectId:"projekt-erstellen-dfc13"
});

const auth=firebase.auth();
const db=firebase.firestore();

const chatRef=db.collection("chat");
const imgRef=db.collection("images");

/* STATE */
let isGuest=false;
let guestUser="";
let currentUsername="";
let lastTranslated="";

/* LOGIN FIX */
function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .then(u=>{
    currentUsername=username.value || u.user.email;
  });
}

function register(){
  auth.createUserWithEmailAndPassword(email.value,password.value)
  .then(u=>{
    currentUsername=username.value || u.user.email;
  });
}

auth.onAuthStateChanged(u=>{
  if(u || isGuest){
    loginScreen.style.display="none";
    app.style.display="block";
    loadChat();
    loadImages();
  }else{
    loginScreen.style.display="flex";
    app.style.display="none";
  }
});

function guestLogin(){
  isGuest=true;
  guestUser=guestName.value;
}

/* MENU */
function toggleMenu(){
  menu.style.display = menu.style.display==="block"?"none":"block";
}

/* CHAT FIX SCROLL + USERNAME */
function loadChat(){
  chatRef.orderBy("time","asc").onSnapshot(s=>{

    const stick =
      chatBox.scrollTop + chatBox.clientHeight >= chatBox.scrollHeight - 30;

    chatBox.innerHTML="";

    s.forEach(d=>{
      const data=d.data();

      const div=document.createElement("div");
      div.innerText = (data.user || "anon") + ": " + data.text;

      chatBox.appendChild(div);
    });

    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        if(stick) chatBox.scrollTop = chatBox.scrollHeight;
      });
    });

  });
}

/* CHAT */
function toggleChat(){
  chatBox.style.display = chatBox.style.display==="block"?"none":"block";
  chatInputBox.style.display = chatInputBox.style.display==="block"?"none":"block";

  requestAnimationFrame(()=>{
    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

function sendChat(){
  if(!chatInput.value.trim()) return;

  chatRef.add({
    text:chatInput.value,
    user:isGuest?guestUser:(currentUsername||"user"),
    time:Date.now()
  });

  chatInput.value="";
}

/* IMAGE FIX */
function openImage(){
  imagePanel.style.display="block";
}

function uploadImage(){
  const file=imgUpload.files[0];
  if(!file) return;

  const reader=new FileReader();

  reader.onload=()=>{
    imgRef.add({
      img:reader.result,
      user:currentUsername||guestUser||"anon",
      time:Date.now()
    });
  };

  reader.readAsDataURL(file);
}

function loadImages(){
  imgRef.orderBy("time","desc").onSnapshot(s=>{
    gallery.innerHTML="";
    s.forEach(d=>{
      const x=d.data();

      const u=document.createElement("div");
      u.innerText=x.user;

      const img=document.createElement("img");
      img.src=x.img;

      gallery.appendChild(u);
      gallery.appendChild(img);
    });
  });
}

/* TRANSLATE FIX */
async function translateText(){
  const r=await fetch(
    "https://api.mymemory.translated.net/get?q="+text.value+
    "&langpair="+fromLang.value+"|"+toLang.value
  );

  const d=await r.json();
  lastTranslated=d.responseData.translatedText;
  output.innerText=lastTranslated;
}

/* FIXED BASE TEXT */
function simplifyText(){
  const base = lastTranslated || text.value;
  output.innerText = base.split(".")[0];
}

function summarizeText(){
  const base = lastTranslated || text.value;
  output.innerText = base.split(" ").slice(0,25).join(" ")+"...";
}

/* LANGS */
const languages={
en:"Englisch",de:"Deutsch",fr:"Französisch",es:"Spanisch",it:"Italienisch",
pt:"Portugiesisch",ru:"Russisch",zh:"Chinesisch",ja:"Japanisch",ko:"Koreanisch"
};

for(let l in languages){
  fromLang.add(new Option(languages[l],l));
  toLang.add(new Option(languages[l],l));
}

</script>

</body>
</html>
