<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brawl Assist Tool</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
}

.container{
  max-width:700px;
  margin:auto;
  padding:20px;
  text-align:center;
}

h1{
  font-size:28px;
}

input{
  width:100%;
  padding:14px;
  margin:6px 0;
  border-radius:10px;
  border:none;
  font-size:16px;
  background:#111827;
  color:white;
}

button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

.box{
  background:#111827;
  padding:15px;
  margin-top:15px;
  border-radius:12px;
  min-height:60px;
  text-align:left;
}

/* small labels */
.tag{
  display:inline-block;
  padding:4px 8px;
  border-radius:6px;
  background:#1f2937;
  margin:3px;
  font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<h1>🎮 Brawl Assist Tool v2</h1>

<p>Enemy Team:</p>

<input id="e1" placeholder="Enemy 1">
<input id="e2" placeholder="Enemy 2">
<input id="e3" placeholder="Enemy 3">

<button onclick="bestPick()">🔥 Best Counter Pick</button>

<div id="result" class="box"></div>

<button onclick="showModes()">🎯 Show Mode Strategy</button>
<div id="modes" class="box"></div>

<button onclick="showMaps()">🗺️ Show Map Strategy</button>
<div id="maps" class="box"></div>

</div>

<script>

/* =========================
   BRAWLER DATABASE
========================= */

const brawlers = {
  shelly: {role:"Tank Counter", good:"close range"},
  colt: {role:"DPS", good:"allround"},
  spike: {role:"Allround", good:"everything"},
  piper: {role:"Sniper", good:"open maps"},
  mortis: {role:"Assassin", good:"snipers"},
  bull: {role:"Tank", weak:"range"},
  frank: {role:"Tank", weak:"burst"},
  edgar: {role:"Assassin", weak:"control"},
  fang: {role:"Assassin", weak:"burst"}
};

/* =========================
   COUNTER LOGIC
========================= */

function bestPick(){

let enemies = (e1.value+" "+e2.value+" "+e3.value).toLowerCase();

let pick = "Spike";
let reason = "Default safe pick (works in most situations)";

/* TANKS */
if(enemies.includes("bull") || enemies.includes("frank")){
pick = "Shelly";
reason = "Strong Tank Counter (burst damage up close)";
}

/* SNIPERS */
else if(enemies.includes("piper")){
pick = "Mortis";
reason = "Can close distance and punish snipers";
}

/* ASSASSINS */
else if(enemies.includes("edgar") || enemies.includes("fang")){
pick = "Colt";
reason = "High DPS to stop aggressive assassins";
}

/* DEFAULT */
else{
pick = "Spike";
reason = "Balanced allrounder pick";
}

result.innerHTML =
"🔥 Best Pick: <b>"+pick+"</b><br><br>🧠 "+reason+
"<br><br><span class='tag'>AI Draft Logic v2</span>";
}

/* =========================
   MODE STRATEGY
========================= */

function showModes(){

modes.innerHTML = `
<b>🎯 Gem Grab:</b><br>
Control + Spike + Support<br><br>

<b>⚽ Brawl Ball:</b><br>
Tanks + Dash + Control<br><br>

<b>💰 Heist:</b><br>
High DPS (Colt, Brock, Spike)<br><br>

<b>🔥 Hot Zone:</b><br>
Area Control (Sandy, Spike, Emz)<br><br>

<span class="tag">Mode Strategy System</span>
`;
}

/* =========================
   MAP STRATEGY
========================= */

function showMaps(){

maps.innerHTML = `
<b>🗺️ Open Maps:</b> Snipers strong (Piper, Brock)<br><br>
<b>🗺️ Closed Maps:</b> Tanks strong (Bull, Frank)<br><br>
<b>🗺️ Bush Maps:</b> Assassins strong (Edgar, Mortis)<br><br>
<b>🗺️ Control Maps:</b> Spike, Sandy, Emz<br><br>

<span class="tag">Map Intelligence System</span>
`;
}

</script>

</body>
</html>
