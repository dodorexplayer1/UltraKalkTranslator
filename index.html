<!DOCTYPE html>
<html>
<head>
  <title>Ultra Translator 50 Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    #loginScreen{
      position:fixed;
      inset:0;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#0f172a,#1e293b);
    }

    .box{
      background:#111827;
      padding:20px;
      border-radius:12px;
      width:300px;
    }

    input,button{
      width:100%;
      padding:10px;
      margin-top:10px;
      border-radius:8px;
      border:none;
    }

    button{
      background:#3b82f6;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    hr{opacity:0.3;margin:10px 0;}

    #app{display:none;padding:20px;}

    textarea,select{
      width:100%;
      margin-top:10px;
      padding:10px;
      border-radius:8px;
      border:none;
    }

    textarea{
      min-height:90px;
      background:#111827;
      color:white;
    }

    select{
      background:#111827;
      color:white;
    }

    #output{
      margin-top:10px;
      padding:10px;
      background:#111827;
      border-radius:8px;
      min-height:60px;
    }

    .row{display:flex;gap:10px;}
    .row button{flex:1;}

    #chatBox{
      position:fixed;
      bottom:70px;
      right:10px;
      width:250px;
      max-height:300px;
      overflow:auto;
      background:#111827;
      padding:10px;
      border-radius:10px;
      display:none;
    }

    #chatInput{
      width:100%;
      padding:8px;
      margin-top:5px;
      border-radius:8px;
      border:none;
      background:#0f172a;
      color:white;
    }

    #chatToggle{
      position:fixed;
      bottom:10px;
      right:10px;
      width:55px;
      height:55px;
      border-radius:50%;
      background:#3b82f6;
      display:flex;
      justify-content:center;
      align-items:center;
      cursor:pointer;
      font-size:22px;
    }

    #menuBtn{
      position:fixed;
      top:10px;
      right:10px;
      font-size:24px;
      cursor:pointer;
    }

    #menu{
      position:fixed;
      top:40px;
      right:10px;
      background:#111827;
      padding:10px;
      border-radius:10px;
      display:none;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="box">

    <h3>Willkommen</h3>

    <input id="email" placeholder="Email (optional)">
    <input id="password" type="password" placeholder="Passwort (optional)">

    <button onclick="login()">Login</button>
    <button onclick="register()">Registrieren</button>

    <hr>

    <input id="guestName" placeholder="Username für Gast">
    <button onclick="guestLogin()">Als Gast fortfahren</button>

  </div>
</div>

<!-- APP -->
<div id="app">

  <div id="menuBtn" onclick="toggleMenu()">|||</div>

  <div id="menu">
    <button onclick="logout()">Logout</button>
  </div>

  <h2>Ultra Translator 50 Global</h2>

  <textarea id="text"></textarea>

  <select id="fromLang"></select>
  <select id="toLang"></select>

  <button onclick="translateText()">Übersetzen</button>

  <div class="row">
    <button onclick="simplifyText()">Vereinfachen</button>
    <button onclick="summarizeText()">Zusammenfassen</button>
  </div>

  <div id="output"></div>
</div>

<!-- CHAT -->
<div id="chatBox"></div>

<div id="chatToggle" onclick="toggleChat()">💬</div>

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyAjS5W-l2Hm_iBSq4_az2WReQwY4ZmEweU",
  authDomain: "projekt-erstellen-dfc13.firebaseapp.com",
  projectId: "projekt-erstellen-dfc13",
  storageBucket: "projekt-erstellen-dfc13.firebasestorage.app",
  messagingSenderId: "1040865035180",
  appId: "1:1040865035180:web:273c7c1998d9b57664f009"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const chatRef = db.collection("chat");

/* STATE */
let isGuest = false;
let guestUser = "";

/* AUTH */
function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
    .catch(e=>alert(e.message));
}

function register(){
  auth.createUserWithEmailAndPassword(email.value,password.value)
    .catch(e=>alert(e.message));
}

function logout(){
  isGuest=false;
  guestUser="";
  auth.signOut();
}

/* GUEST */
function guestLogin(){
  const name=guestName.value;

  if(!name.trim()){
    alert("Username fehlt");
    return;
  }

  isGuest=true;
  guestUser=name;

  loginScreen.style.display="none";
  app.style.display="block";

  loadChat();
}

/* STATE */
auth.onAuthStateChanged(user=>{
  if(user || isGuest){
    loginScreen.style.display="none";
    app.style.display="block";
    loadChat();
  }else{
    loginScreen.style.display="flex";
    app.style.display="none";
  }
});

/* MENU */
function toggleMenu(){
  const m=document.getElementById("menu");
  m.style.display=m.style.display==="none"?"block":"none";
}

/* CHAT FIX */
function loadChat(){
  chatRef.orderBy("time").onSnapshot(snap=>{
    const box=document.getElementById("chatBox");
    box.innerHTML="";

    snap.forEach(d=>{
      const data=d.data();
      const div=document.createElement("div");
      div.innerText=data.user+": "+data.text;
      box.appendChild(div);
    });
  });
}

function toggleChat(){
  const box=document.getElementById("chatBox");
  box.style.display=box.style.display==="none"?"block":"none";
}

function sendChat(){
  const msg=chatInput.value;
  if(!msg) return;

  let user="Gast";

  if(isGuest){
    user=guestUser;
  }else if(auth.currentUser){
    user=auth.currentUser.email;
  }

  chatRef.add({
    text:msg,
    user:user,
    time:Date.now()
  });

  chatInput.value="";
}

/* TRANSLATE */
async function translateText(){
  const text=document.getElementById("text").value;

  const res=await fetch(
    "https://api.mymemory.translated.net/get?q="+
    encodeURIComponent(text)+
    "&langpair=en|de"
  );

  const data=await res.json();
  output.innerText=data.responseData.translatedText;
}

/* SIMPLE */
function simplifyText(){
  output.innerText="VEREINFACHT:\n\n"+text.value.split(".")[0];
}

function summarizeText(){
  output.innerText="ZUSAMMENFASSUNG:\n\n"+text.value.slice(0,120)+"...";
}

/* LANGUAGES */
const languages={
  en:"Englisch",de:"Deutsch",fr:"Französisch",es:"Spanisch",
  it:"Italienisch",pt:"Portugiesisch",ru:"Russisch",zh:"Chinesisch",
  ja:"Japanisch",ko:"Koreanisch",ar:"Arabisch",hi:"Hindi",
  fa:"Persisch",ur:"Urdu",bn:"Bengalisch",tr:"Türkisch",
  vi:"Vietnamesisch",id:"Indonesisch",pl:"Polnisch",uk:"Ukrainisch",
  nl:"Niederländisch",el:"Griechisch",sv:"Schwedisch",da:"Dänisch",
  fi:"Finnisch",no:"Norwegisch",cs:"Tschechisch",ro:"Rumänisch",
  hu:"Ungarisch",he:"Hebräisch",th:"Thailändisch",ms:"Malaiisch",
  tl:"Filipino",sw:"Swahili",ta:"Tamil",te:"Telugu",
  ml:"Malayalam",kn:"Kannada",pa:"Punjabi",mr:"Marathi",
  ne:"Nepalesisch",si:"Singhalesisch",my:"Burmesisch",km:"Khmer",
  lo:"Laotisch",am:"Amharisch",az:"Aserbaidschanisch",so:"Somali",
  zu:"Zulu",yo:"Yoruba"
};

function loadLanguages(){
  const f=document.getElementById("fromLang");
  const t=document.getElementById("toLang");

  for(let c in languages){
    f.add(new Option(languages[c],c));
    t.add(new Option(languages[c],c));
  }
}

document.addEventListener("DOMContentLoaded",loadLanguages);

</script>

</body>
</html>
