<!DOCTYPE html>
<html>
<head>
  <title>Ultra Translator 50 Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    #loginScreen{
      position:fixed;
      inset:0;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#0f172a,#1e293b);
    }

    .box{
      background:#111827;
      padding:20px;
      border-radius:12px;
      width:300px;
    }

    input,button{
      width:100%;
      padding:10px;
      margin-top:10px;
      border-radius:8px;
      border:none;
    }

    button{
      background:#3b82f6;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    #app{display:none;padding:20px;}

    textarea,select{
      width:100%;
      margin-top:10px;
      padding:10px;
      border-radius:8px;
      border:none;
    }

    textarea{
      min-height:90px;
      background:#111827;
      color:white;
    }

    select{
      background:#111827;
      color:white;
    }

    #output{
      margin-top:10px;
      padding:10px;
      background:#111827;
      border-radius:8px;
      min-height:60px;
      white-space:pre-line;
    }

    .row{display:flex;gap:10px;}
    .row button{flex:1;}

    /* CHAT */
    #chatBox{
      position:fixed;
      bottom:140px;
      right:10px;
      width:250px;
      max-height:250px;
      overflow-y:auto;
      background:#111827;
      padding:10px;
      border-radius:10px;
      display:none;
    }

    #chatInputBox{
      position:fixed;
      bottom:70px;
      right:10px;
      width:250px;
      background:#111827;
      padding:10px;
      border-radius:10px;
      display:none;
    }

    #chatInput{
      width:100%;
      padding:8px;
      border-radius:8px;
      border:none;
      background:#0f172a;
      color:white;
    }

    #chatToggle{
      position:fixed;
      bottom:10px;
      right:10px;
      width:55px;
      height:55px;
      border-radius:50%;
      background:#3b82f6;
      display:flex;
      justify-content:center;
      align-items:center;
      cursor:pointer;
      font-size:22px;
    }

    /* MENU */
    #menuBtn{
      position:fixed;
      top:10px;
      right:10px;
      font-size:24px;
      cursor:pointer;
    }

    #menu{
      position:fixed;
      top:40px;
      right:10px;
      background:#111827;
      padding:10px;
      border-radius:10px;
      display:none;
      width:240px;
    }

    #menuInfo{
      font-size:12px;
      opacity:0.85;
      margin-bottom:10px;
      white-space:pre-line;
    }

    /* + BUTTON TOP CENTER */
    #secretPlus{
      position:fixed;
      top:8px;
      left:50%;
      transform:translateX(-50%);
      font-size:22px;
      cursor:pointer;
      color:white;
      opacity:0.7;
    }

    /* IMAGE PANEL */
    #imagePanel{
      position:fixed;
      top:60px;
      left:10px;
      width:220px;
      background:#111827;
      padding:10px;
      border-radius:10px;
      display:none;
      max-height:300px;
      overflow:auto;
    }

    #gallery img{
      width:100%;
      margin-top:5px;
      border-radius:6px;
    }

    #gallery div{
      font-size:10px;
      opacity:0.8;
      margin-bottom:8px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="box">

    <h3>Login</h3>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Passwort">
    <input id="username" placeholder="Username">

    <button onclick="login()">Login</button>
    <button onclick="register()">Registrieren</button>

    <hr>

    <input id="guestName" placeholder="Gast Username">
    <button onclick="guestLogin()">Als Gast</button>
  </div>
</div>

<!-- APP -->
<div id="app">

  <div id="menuBtn" onclick="toggleMenu()">|||</div>

  <div id="menu">
    <div id="menuInfo"></div>

    <button onclick="openSettings()">Settings</button>
    <button onclick="openHelp()">Help & Support</button>
    <button onclick="openInfo()">Info</button>

    <hr>
    <button onclick="logout()">Logout</button>
  </div>

  <h2>Ultra Translator 50 Global</h2>

  <textarea id="text"></textarea>

  <select id="fromLang"></select>
  <select id="toLang"></select>

  <button onclick="translateText()">Übersetzen</button>

  <div class="row">
    <button onclick="simplifyText()">Vereinfachen</button>
    <button onclick="summarizeText()">Zusammenfassen</button>
  </div>

  <div id="output"></div>
</div>

<!-- CHAT -->
<div id="chatBox"></div>

<div id="chatInputBox">
  <input id="chatInput" placeholder="Nachricht...">
  <button onclick="sendChat()">Senden</button>
</div>

<div id="chatToggle" onclick="toggleChat()">💬</div>

<!-- SECRET + -->
<div id="secretPlus" onclick="askImageCode()">+</div>

<!-- IMAGES -->
<div id="imagePanel">
  <h3>Images</h3>
  <input type="file" id="imgUpload" accept="image/*" onchange="uploadImage()">
  <div id="gallery"></div>
</div>

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyAjS5W-l2Hm_iBSq4_az2WReQwY4ZmEweU",
  authDomain: "projekt-erstellen-dfc13.firebaseapp.com",
  projectId: "projekt-erstellen-dfc13",
  storageBucket: "projekt-erstellen-dfc13.firebasestorage.app",
  messagingSenderId: "1040865035180",
  appId: "1:1040865035180:web:273c7c1998d9b57664f009"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

const chatRef = db.collection("chat");
const imgRef = db.collection("images");

/* STATE */
let isGuest=false;
let guestUser="";
let currentUsername="";
let chatOpen=false;
let chatUnlocked=false;
let imageUnlocked=false;
let lastTranslatedText="";
let translationHistory=[];
let chatUnsubscribe=null;

/* CODE */
const IMAGE_CODE="IloveCodeGeass";

/* LOGIN */
function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
    .then(()=>currentUsername=username.value);
}

function register(){
  auth.createUserWithEmailAndPassword(email.value,password.value)
    .then(()=>currentUsername=username.value);
}

function logout(){
  auth.signOut();
}

/* GUEST */
function guestLogin(){
  isGuest=true;
  guestUser=guestName.value;

  loginScreen.style.display="none";
  app.style.display="block";
}

/* AUTH */
auth.onAuthStateChanged(user=>{
  if(user || isGuest){
    loginScreen.style.display="none";
    app.style.display="block";
  }else{
    loginScreen.style.display="flex";
    app.style.display="none";
  }
});

/* MENU */
function toggleMenu(){
  const m=document.getElementById("menu");
  m.style.display=m.style.display==="none"?"block":"none";
}

/* CHAT */
function toggleChat(){
  chatOpen=!chatOpen;
  chatBox.style.display=chatOpen?"block":"none";
  chatInputBox.style.display=chatOpen?"block":"none";
}

function sendChat(){
  const msg=document.getElementById("chatInput").value;
  if(!msg.trim()) return;

  const user=isGuest?guestUser:(currentUsername||auth.currentUser?.email);

  chatRef.add({
    text:msg,
    user:user,
    time:Date.now()
  });

  document.getElementById("chatInput").value="";
}

/* IMAGE CODE */
function askImageCode(){
  const c=prompt("what's the code?");
  if(c===IMAGE_CODE){
    imageUnlocked=true;
    document.getElementById("imagePanel").style.display="block";
    loadImages();
  }else alert("Wrong code");
}

/* IMAGES */
function uploadImage(){
  if(!imageUnlocked) return;

  const file=document.getElementById("imgUpload").files[0];
  const reader=new FileReader();

  reader.onload=()=>{
    imgRef.add({
      img:reader.result,
      user:currentUsername||guestUser||"anon",
      time:Date.now()
    });
  };

  reader.readAsDataURL(file);
}

function loadImages(){
  imgRef.orderBy("time","desc").onSnapshot(snap=>{
    const g=document.getElementById("gallery");
    g.innerHTML="";

    snap.forEach(d=>{
      const wrap=document.createElement("div");

      const img=document.createElement("img");
      img.src=d.data().img;

      const label=document.createElement("div");
      label.innerText="by: "+(d.data().user||"unknown");

      wrap.appendChild(img);
      wrap.appendChild(label);
      g.appendChild(wrap);
    });
  });
}

/* TRANSLATE */
async function translateText(){
  const text=document.getElementById("text").value;
  const from=document.getElementById("fromLang").value;
  const to=document.getElementById("toLang").value;

  const res=await fetch(
    "https://api.mymemory.translated.net/get?q="+encodeURIComponent(text)+"&langpair="+from+"|"+to
  );

  const data=await res.json();
  lastTranslatedText=data.responseData.translatedText;

  document.getElementById("output").innerText=lastTranslatedText;
}

/* FIX */
function simplifyText(){
  const b=lastTranslatedText||document.getElementById("text").value;
  document.getElementById("output").innerText="VEREINFACHT:\n\n"+b.split(".")[0];
}

function summarizeText(){
  const b=lastTranslatedText||document.getElementById("text").value;
  document.getElementById("output").innerText="ZUSAMMENFASSUNG:\n\n"+b.split(" ").slice(0,25).join(" ")+"...";
}

/* MENU */
function openSettings(){document.getElementById("output").innerText="Settings";}
function openHelp(){document.getElementById("output").innerText="Help";}
function openInfo(){document.getElementById("output").innerText="Info";}

/* LANGUAGES */
const languages={
en:"Englisch",de:"Deutsch",fr:"Französisch",es:"Spanisch",it:"Italienisch",
pt:"Portugiesisch",ru:"Russisch",zh:"Chinesisch",ja:"Japanisch",ko:"Koreanisch"
};

function loadLanguages(){
  for(let c in languages){
    fromLang.add(new Option(languages[c],c));
    toLang.add(new Option(languages[c],c));
  }
}
document.addEventListener("DOMContentLoaded",loadLanguages);

</script>

</body>
</html>
