<!DOCTYPE html>
<html>
<head>
  <title>Ultra Translator 50 Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    #loginScreen{
      position:fixed;
      inset:0;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#0f172a,#1e293b);
    }

    .box{
      background:#111827;
      padding:20px;
      border-radius:12px;
      width:300px;
    }

    input,button{
      width:100%;
      padding:10px;
      margin-top:10px;
      border-radius:8px;
      border:none;
    }

    button{
      background:#3b82f6;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    #app{display:none;padding:20px;}

    textarea,select{
      width:100%;
      margin-top:10px;
      padding:10px;
      border-radius:8px;
      border:none;
    }

    textarea{
      min-height:90px;
      background:#111827;
      color:white;
    }

    select{
      background:#111827;
      color:white;
    }

    #output{
      margin-top:10px;
      padding:10px;
      background:#111827;
      border-radius:8px;
      min-height:60px;
      white-space:pre-line;
    }

    /* CHAT */
    #chatBox{
      position:fixed;
      bottom:140px;
      right:10px;
      width:260px;
      height:260px;
      overflow-y:auto;
      background:#111827;
      padding:10px;
      border-radius:10px;
      display:none;
    }

    #chatInputBox{
      position:fixed;
      bottom:70px;
      right:10px;
      width:260px;
      background:#111827;
      padding:10px;
      border-radius:10px;
      display:none;
    }

    #chatToggle{
      position:fixed;
      bottom:10px;
      right:10px;
      width:55px;
      height:55px;
      border-radius:50%;
      background:#3b82f6;
      display:flex;
      justify-content:center;
      align-items:center;
      cursor:pointer;
    }

    /* UPLOAD */
    #uploadBtn{
      position:fixed;
      bottom:85px;
      left:50%;
      transform:translateX(-50%);
      z-index:999;
    }

    #imagePanel{
      display:none;
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      width:320px;
      background:#111827;
      padding:10px;
      border-radius:10px;
      z-index:999;
      max-height:70vh;
      overflow-y:auto;
    }

    #gallery img{
      width:100%;
      margin-top:10px;
      border-radius:8px;
    }

    #pages{
      display:flex;
      gap:5px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    #pages button{
      padding:5px;
      width:auto;
    }
  </style>
</head>

<body>

<div id="loginScreen">
  <div class="box">
    <h3>Login</h3>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Passwort">
    <input id="username" placeholder="Username">

    <button onclick="login()">Login</button>
    <button onclick="register()">Registrieren</button>

    <hr>

    <input id="guestName" placeholder="Gast Username">
    <button onclick="guestLogin()">Als Gast</button>
  </div>
</div>

<div id="app">

  <h2>Ultra Translator 50 Global</h2>

  <!-- UPLOAD -->
  <div id="uploadBtn">
    <button onclick="openUpload()">+ Upload Image</button>
  </div>

  <textarea id="text"></textarea>

  <select id="fromLang"></select>
  <select id="toLang"></select>

  <button onclick="translateText()">Übersetzen</button>

  <div id="output"></div>

  <!-- CHAT -->
  <div id="chatBox"></div>

  <div id="chatInputBox">
    <input id="chatInput" placeholder="Nachricht...">
    <button onclick="sendChat()">Senden</button>
  </div>

  <div id="chatToggle" onclick="toggleChat()">💬</div>

</div>

<!-- IMAGE PANEL -->
<div id="imagePanel">

  <button onclick="closeUpload()">✖ Close</button>

  <input type="file" id="imgUpload">
  <button onclick="uploadImage()">Upload</button>

  <div id="pages"></div>
  <div id="gallery"></div>

</div>

<script>

/* FIREBASE */
firebase.initializeApp({
  apiKey:"AIzaSyAjS5W-l2Hm_iBSq4_az2WReQwY4ZmEweU",
  authDomain:"projekt-erstellen-dfc13.firebaseapp.com",
  projectId:"projekt-erstellen-dfc13"
});

const auth=firebase.auth();
const db=firebase.firestore();

const chatRef=db.collection("chat");
const imgRef=db.collection("images");

/* STATE */
let isGuest=false;
let guestUser="";
let currentUsername="";
let uploadUnlocked=false;

let pageSize=4;
let currentPage=1;

/* LOGIN */
function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .then(u=>{
    currentUsername=username.value || u.user.email;
  });
}

function register(){
  auth.createUserWithEmailAndPassword(email.value,password.value)
  .then(u=>{
    currentUsername=username.value || u.user.email;
  });
}

function guestLogin(){
  isGuest=true;
  guestUser=guestName.value;
}

/* AUTH */
auth.onAuthStateChanged(u=>{
  if(u || isGuest){
    loginScreen.style.display="none";
    app.style.display="block";
    loadChat();
    loadImages();
  }else{
    loginScreen.style.display="flex";
    app.style.display="none";
  }
});

/* CHAT */
function loadChat(){

  chatRef.orderBy("time","asc").onSnapshot(snap=>{

    const box=document.getElementById("chatBox");

    const atBottom =
      box.scrollTop + box.clientHeight >= box.scrollHeight - 80;

    box.innerHTML="";

    snap.forEach(d=>{
      const data=d.data();
      const div=document.createElement("div");
      div.innerText=(data.user||"anon")+": "+data.text;
      box.appendChild(div);
    });

    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        if(atBottom){
          box.scrollTop = box.scrollHeight;
        }
      });
    });

  });
}

function sendChat(){
  if(!chatInput.value.trim()) return;

  chatRef.add({
    text:chatInput.value,
    user:isGuest?guestUser:(currentUsername||"user"),
    time:Date.now()
  });

  chatInput.value="";
}

function toggleChat(){
  const open = chatBox.style.display==="block";
  chatBox.style.display=open?"none":"block";
  chatInputBox.style.display=open?"none":"block";

  requestAnimationFrame(()=>{
    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

/* UPLOAD */
function openUpload(){
  if(!uploadUnlocked){
    const code=prompt("Upload Code?");
    if(code!=="$00$") return;
    uploadUnlocked=true;
  }
  imagePanel.style.display="block";
}

function closeUpload(){
  imagePanel.style.display="none";
}

/* IMAGE */
function uploadImage(){
  const file=imgUpload.files[0];
  if(!file) return;

  const reader=new FileReader();
  reader.onload=()=>{
    imgRef.add({
      img:reader.result,
      user:currentUsername||guestUser||"anon",
      time:Date.now()
    });
  };
  reader.readAsDataURL(file);
}

/* PAGINATION + DELETE */
function loadImages(){

  imgRef.orderBy("time","desc").onSnapshot(s=>{

    const all=[];
    s.forEach(d=>{
      all.push({id:d.id, ...d.data()});
    });

    const start=(currentPage-1)*pageSize;
    const page=all.slice(start,start+pageSize);

    gallery.innerHTML="";

    page.forEach(x=>{

      const wrap=document.createElement("div");

      const img=document.createElement("img");
      img.src=x.img;

      const del=document.createElement("button");
      del.innerText="Delete";

      del.onclick=()=>imgRef.doc(x.id).delete();

      wrap.appendChild(img);
      wrap.appendChild(del);

      gallery.appendChild(wrap);
    });

    renderPages(all.length);

  });
}

function renderPages(total){
  const pages=Math.ceil(total/pageSize);
  pages.innerHTML="";

  const box=document.getElementById("pages");
  box.innerHTML="";

  for(let i=1;i<=pages;i++){
    const b=document.createElement("button");
    b.innerText=i;
    b.onclick=()=>{
      currentPage=i;
      loadImages();
    };
    box.appendChild(b);
  }
}

/* TRANSLATE */
async function translateText(){
  const r=await fetch(
    "https://api.mymemory.translated.net/get?q="+text.value+
    "&langpair="+fromLang.value+"|"+toLang.value
  );

  const d=await r.json();
  output.innerText=d.responseData.translatedText;
}

/* LANGS */
const languages={
en:"Englisch",de:"Deutsch",fr:"Französisch",es:"Spanisch",it:"Italienisch"
};

for(let l in languages){
  fromLang.add(new Option(languages[l],l));
  toLang.add(new Option(languages[l],l));
}

</script>

</body>
</html>
