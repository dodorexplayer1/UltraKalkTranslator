<!DOCTYPE html>
<html>
<head>
  <title>Ultra Translator</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      width: 90%;
      max-width: 450px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    textarea, select, button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
    }

    button {
      background: #3b82f6;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    #output {
      margin-top: 15px;
      padding: 10px;
      background: #0f172a;
      border-radius: 8px;
      min-height: 40px;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Ultra Translator</h2>

  <textarea id="text" placeholder="Text eingeben"></textarea>

  <select id="lang">
    <option value="en">Englisch</option>
    <option value="es">Spanisch</option>
    <option value="fr">Französisch</option>
    <option value="it">Italienisch</option>
    <option value="tr">Türkisch</option>
    <option value="ru">Russisch</option>
    <option value="ar">Arabisch</option>
    <option value="zh">Chinesisch</option>
    <option value="ja">Japanisch</option>
  </select>

  <button onclick="translateText()">Übersetzen</button>

  <div id="output"></div>
</div>

<script>
async function translateText() {
  let text = document.getElementById("text").value;
  let lang = document.getElementById("lang").value;

  if (!text) {
    document.getElementById("output").innerText = "Bitte Text eingeben";
    return;
  }

  try {
    let response = await fetch(
      "https://api.mymemory.translated.net/get?q="
      + encodeURIComponent(text)
      + "&langpair=de|" + lang
    );

    let data = await response.json();

    document.getElementById("output").innerText =
      data.responseData.translatedText;
  } catch (e) {
    document.getElementById("output").innerText =
      "Fehler beim Übersetzen";
  }
}
</script>

</body>
</html>
